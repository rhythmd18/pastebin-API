  /snippets/:
    get:
      operationId: snippets_list
      description: |-
        This viewset automatically provides `list`, `create`, `retrieve`,
        `update`, and `destroy` actions.

        Addtionally, we also provide an extra `highlight` action.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - snippets
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSnippetList'
          description: ''
    post:
      operationId: snippets_create
      description: |-
        This viewset automatically provides `list`, `create`, `retrieve`,
        `update`, and `destroy` actions.

        Addtionally, we also provide an extra `highlight` action.
      tags:
      - snippets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Snippet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Snippet'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Snippet'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snippet'
          description: ''
  /snippets/{id}/:
    get:
      operationId: snippets_retrieve
      description: |-
        This viewset automatically provides `list`, `create`, `retrieve`,
        `update`, and `destroy` actions.

        Addtionally, we also provide an extra `highlight` action.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this snippet.
        required: true
      tags:
      - snippets
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snippet'
          description: ''
    put:
      operationId: snippets_update
      description: |-
        This viewset automatically provides `list`, `create`, `retrieve`,
