          application/json:
            schema:
              $ref: '#/components/schemas/Snippet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Snippet'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Snippet'
        required: true
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snippet'
          description: ''
    patch:
      operationId: snippets_partial_update
      description: |-
        This viewset automatically provides `list`, `create`, `retrieve`,
        `update`, and `destroy` actions.

        Addtionally, we also provide an extra `highlight` action.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this snippet.
        required: true
      tags:
      - snippets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSnippet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSnippet'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSnippet'
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Snippet'
          description: ''
    delete:
      operationId: snippets_destroy
      description: |-
        This viewset automatically provides `list`, `create`, `retrieve`,
        `update`, and `destroy` actions.

        Addtionally, we also provide an extra `highlight` action.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this snippet.
        required: true
      tags:
      - snippets
      security:
      - jwtHeaderAuth: []
      - jwtCookieAuth: []
      responses:
        '204':
          description: No response body
  /snippets/{id}/highlight/:
    get:
      operationId: snippets_highlight_retrieve
